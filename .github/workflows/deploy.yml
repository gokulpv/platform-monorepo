name: deploy to Cloudflare

on:
  push:
    branches:
      - test

jobs:
  deploy-worker:
    name: deploy Hono Worker & Migrations
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: install dependencies
        run: npm ci

      - name: install wrangler
        run: npm install -g wrangler

      # ✅ Run DB migrations
      - name: apply D1 Migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd apps/worker
          wrangler d1 migrations apply DB --remote

      # ✅ Build client (ensures latest assets)
      - name: build client (for assets)
        run: npm run build --workspace=client

      # ✅ Upload ALL assets (including folders) to R2
      - name: sync assets to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler r2 sync ./apps/client/static/assets r2://platform-assets

      # ✅ Deploy worker
      - name: deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd apps/worker
          wrangler deploy --minify

  deploy-client:
    name: deploy client (Svelte)
    needs: deploy-worker
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: install dependencies
        run: npm ci

      - name: install wrangler
        run: npm install -g wrangler

      - name: build client
        run: npm run build --workspace=client

      - name: deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler pages deploy apps/client/.svelte-kit/cloudflare \
            --project-name=client \
            --branch=test

  deploy-admin:
    name: deploy admin (React)
    needs: deploy-worker
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: install dependencies
        run: npm ci

      - name: install wrangler
        run: npm install -g wrangler

      - name: build admin
        run: npm run build --workspace=admin

      - name: deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler pages deploy apps/admin/dist \
            --project-name=admin \
            --branch=test
